  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <text x="32" y="22" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle" filter="url(#glow)">KALI</text>
  <text x="32" y="36" font-family="monospace" font-size="10" fill="#39ff14" text-anchor="middle" filter="url(#glow)">WEB</text>
  <rect x="8" y="40" width="48" height="1" fill="#a855f7" opacity="0.6"/>
